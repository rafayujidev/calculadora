<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
    }

    /* Animated background */
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .bg-gradient::before,
    .bg-gradient::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.5;
      animation: float 8s ease-in-out infinite alternate;
    }

    .bg-gradient::before {
      width: 500px;
      height: 500px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      top: -10%;
      left: -5%;
    }

    .bg-gradient::after {
      width: 400px;
      height: 400px;
      background: linear-gradient(135deg, #ec4899, #f43f5e);
      bottom: -10%;
      right: -5%;
      animation-delay: -4s;
    }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.1); }
    }

    /* Calculator container */
    .calculator {
      position: relative;
      z-index: 1;
      width: 340px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 24px;
      box-shadow:
        0 25px 50px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 1px 0 rgba(255, 255, 255, 0.1) inset;
      transition: width 0.3s ease;
    }

    .calculator.scientific {
      width: 680px;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
      padding: 3px;
    }

    .mode-btn {
      flex: 1;
      height: 32px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      color: rgba(255, 255, 255, 0.4);
      transition: all 0.2s;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .mode-btn.active {
      background: rgba(139, 92, 246, 0.3);
      color: #a78bfa;
    }

    .mode-btn:hover:not(.active) {
      color: rgba(255, 255, 255, 0.6);
    }

    /* Scientific panel */
    .scientific-panel {
      display: none;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .calculator.scientific .scientific-panel {
      display: grid;
    }

    .btn-sci {
      height: 48px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      background: rgba(99, 102, 241, 0.1);
      color: rgba(167, 139, 250, 0.8);
      border: 1px solid rgba(99, 102, 241, 0.1);
    }

    .btn-sci:hover {
      background: rgba(99, 102, 241, 0.2);
      color: #a78bfa;
    }

    .btn-sci:active {
      transform: scale(0.95);
      background: rgba(99, 102, 241, 0.35);
    }

    /* Second layout row for scientific */
    .sci-layout {
      display: flex;
      gap: 12px;
    }

    .calculator:not(.scientific) .sci-layout {
      flex-direction: column;
      align-items: center;
    }

    .sci-sidebar {
      display: none;
      flex-direction: column;
      gap: 8px;
      min-width: 140px;
    }

    .calculator.scientific .sci-sidebar {
      display: flex;
    }

    .btn-sci-tall {
      height: 48px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      background: rgba(236, 72, 153, 0.12);
      color: rgba(244, 114, 182, 0.85);
      border: 1px solid rgba(236, 72, 153, 0.1);
      flex: 1;
    }

    .btn-sci-tall:hover {
      background: rgba(236, 72, 153, 0.22);
      color: #f472b6;
    }

    .btn-sci-tall:active {
      transform: scale(0.95);
      background: rgba(236, 72, 153, 0.35);
    }

    /* Angle mode indicator */
    .angle-mode {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .angle-btn {
      height: 32px;
      padding: 0 10px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: rgba(255,255,255,0.3);
      transition: all 0.15s;
      letter-spacing: 0.3px;
    }

    .angle-btn.active {
      background: rgba(99, 102, 241, 0.25);
      color: #a78bfa;
      border-color: rgba(99, 102, 241, 0.2);
    }

    /* Display */
    .display {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 16px;
      padding: 20px 24px;
      margin-bottom: 20px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      border: 1px solid rgba(255, 255, 255, 0.05);
      overflow: hidden;
    }

    .expression {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
      min-height: 22px;
      word-break: break-all;
      text-align: right;
      width: 100%;
      transition: color 0.2s;
    }

    .result {
      font-size: 42px;
      color: #fff;
      font-weight: 300;
      letter-spacing: -1px;
      word-break: break-all;
      text-align: right;
      width: 100%;
      line-height: 1.1;
      transition: font-size 0.15s ease;
    }

    .result.shrink {
      font-size: 32px;
    }

    /* Button grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 62px;
      border: none;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 20px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
      overflow: hidden;
      outline: none;
    }

    /* Ripple effect */
    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(255,255,255,0.25), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    button:active::after {
      opacity: 1;
    }

    /* Number buttons */
    .btn-number {
      background: rgba(255, 255, 255, 0.07);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .btn-number:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn-number:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.18);
    }

    /* Operator buttons */
    .btn-operator {
      background: rgba(139, 92, 246, 0.25);
      color: #a78bfa;
      border: 1px solid rgba(139, 92, 246, 0.15);
    }

    .btn-operator:hover {
      background: rgba(139, 92, 246, 0.35);
    }

    .btn-operator:active {
      transform: scale(0.95);
      background: rgba(139, 92, 246, 0.5);
    }

    /* Function buttons */
    .btn-function {
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.04);
      font-size: 17px;
    }

    .btn-function:hover {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
    }

    .btn-function:active {
      transform: scale(0.95);
      background: rgba(255, 255, 255, 0.12);
    }

    /* Equals button */
    .btn-equals {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 24px;
      border: none;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    .btn-equals:hover {
      background: linear-gradient(135deg, #7577f5, #9b6ff9);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }

    .btn-equals:active {
      transform: scale(0.95);
      box-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
    }

    /* Clear button */
    .btn-clear {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.1);
    }

    .btn-clear:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .btn-clear:active {
      transform: scale(0.95);
      background: rgba(239, 68, 68, 0.4);
    }

    /* Zero button spans 2 columns */
    .btn-zero {
      grid-column: span 2;
    }

    /* Keyboard hint */
    .keyboard-hint {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.5px;
    }

    /* Animation for result change */
    @keyframes resultPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    .result.pop {
      animation: resultPop 0.15s ease;
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>

  <div class="calculator" id="calculator">
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeBasic">Basic</button>
      <button class="mode-btn" id="modeScientific">Scientific</button>
      <div class="angle-mode" id="angleMode" style="display:none;">
        <button class="angle-btn active" id="angleDeg">DEG</button>
        <button class="angle-btn" id="angleRad">RAD</button>
      </div>
    </div>

    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="sci-layout">
      <div>
        <!-- Scientific function row 1 -->
        <div class="scientific-panel">
          <button class="btn-sci" data-action="sci" data-value="sin">sin</button>
          <button class="btn-sci" data-action="sci" data-value="cos">cos</button>
          <button class="btn-sci" data-action="sci" data-value="tan">tan</button>
          <button class="btn-sci" data-action="sci" data-value="log">log</button>
          <button class="btn-sci" data-action="sci" data-value="ln">ln</button>

          <button class="btn-sci" data-action="sci" data-value="asin">sin⁻¹</button>
          <button class="btn-sci" data-action="sci" data-value="acos">cos⁻¹</button>
          <button class="btn-sci" data-action="sci" data-value="atan">tan⁻¹</button>
          <button class="btn-sci" data-action="sci" data-value="log2">log₂</button>
          <button class="btn-sci" data-action="sci" data-value="exp">eˣ</button>

          <button class="btn-sci" data-action="sci" data-value="sqrt">√</button>
          <button class="btn-sci" data-action="sci" data-value="cbrt">∛</button>
          <button class="btn-sci" data-action="sci" data-value="square">x²</button>
          <button class="btn-sci" data-action="sci" data-value="cube">x³</button>
          <button class="btn-sci" data-action="sci" data-value="power">xʸ</button>

          <button class="btn-sci" data-action="sci" data-value="factorial">n!</button>
          <button class="btn-sci" data-action="sci" data-value="inv">1/x</button>
          <button class="btn-sci" data-action="sci" data-value="abs">|x|</button>
          <button class="btn-sci" data-action="sci" data-value="pi">π</button>
          <button class="btn-sci" data-action="sci" data-value="e">e</button>

          <button class="btn-sci" data-action="sci" data-value="rand">rand</button>
          <button class="btn-sci" data-action="sci" data-value="paren_open">(</button>
          <button class="btn-sci" data-action="sci" data-value="paren_close">)</button>
          <button class="btn-sci" data-action="sci" data-value="10x">10ˣ</button>
          <button class="btn-sci" data-action="sci" data-value="2x">2ˣ</button>
        </div>
      </div>
      <div class="sci-sidebar">
        <!-- Sidebar with memory / history extras -->
        <button class="btn-sci-tall" data-action="sci" data-value="ms">MS</button>
        <button class="btn-sci-tall" data-action="sci" data-value="mr">MR</button>
        <button class="btn-sci-tall" data-action="sci" data-value="mc">MC</button>
        <button class="btn-sci-tall" data-action="sci" data-value="m+">M+</button>
      </div>
    </div>

    <div class="buttons">
      <button class="btn-clear" data-action="clear">AC</button>
      <button class="btn-function" data-action="toggle-sign">+/−</button>
      <button class="btn-function" data-action="percent">%</button>
      <button class="btn-operator" data-action="operator" data-value="/">÷</button>

      <button class="btn-number" data-action="number" data-value="7">7</button>
      <button class="btn-number" data-action="number" data-value="8">8</button>
      <button class="btn-number" data-action="number" data-value="9">9</button>
      <button class="btn-operator" data-action="operator" data-value="*">×</button>

      <button class="btn-number" data-action="number" data-value="4">4</button>
      <button class="btn-number" data-action="number" data-value="5">5</button>
      <button class="btn-number" data-action="number" data-value="6">6</button>
      <button class="btn-operator" data-action="operator" data-value="-">−</button>

      <button class="btn-number" data-action="number" data-value="1">1</button>
      <button class="btn-number" data-action="number" data-value="2">2</button>
      <button class="btn-number" data-action="number" data-value="3">3</button>
      <button class="btn-operator" data-action="operator" data-value="+">+</button>

      <button class="btn-number btn-zero" data-action="number" data-value="0">0</button>
      <button class="btn-number" data-action="decimal">.</button>
      <button class="btn-equals" data-action="equals">=</button>
    </div>

    <div class="keyboard-hint">Keyboard supported</div>
  </div>

  <script>
    const expressionEl = document.getElementById('expression');
    const resultEl = document.getElementById('result');
    const calcEl = document.getElementById('calculator');
    const modeBasic = document.getElementById('modeBasic');
    const modeScientific = document.getElementById('modeScientific');
    const angleModeEl = document.getElementById('angleMode');
    const angleDeg = document.getElementById('angleDeg');
    const angleRad = document.getElementById('angleRad');

    let currentInput = '0';
    let previousInput = '';
    let operator = null;
    let shouldResetInput = false;
    let lastExpression = '';
    let memory = 0;
    let angleUnit = 'deg'; // 'deg' or 'rad'
    let expressionStack = [];
    let pendingOpenParens = 0;

    const operatorSymbols = { '/': '÷', '*': '×', '-': '−', '+': '+' };

    // --- Mode toggle ---
    modeBasic.addEventListener('click', () => {
      calcEl.classList.remove('scientific');
      modeBasic.classList.add('active');
      modeScientific.classList.remove('active');
      angleModeEl.style.display = 'none';
    });

    modeScientific.addEventListener('click', () => {
      calcEl.classList.add('scientific');
      modeScientific.classList.add('active');
      modeBasic.classList.remove('active');
      angleModeEl.style.display = 'flex';
    });

    angleDeg.addEventListener('click', () => {
      angleUnit = 'deg';
      angleDeg.classList.add('active');
      angleRad.classList.remove('active');
    });

    angleRad.addEventListener('click', () => {
      angleUnit = 'rad';
      angleRad.classList.add('active');
      angleDeg.classList.remove('active');
    });

    function toRad(val) {
      return angleUnit === 'deg' ? (val * Math.PI / 180) : val;
    }

    function fromRad(val) {
      return angleUnit === 'deg' ? (val * 180 / Math.PI) : val;
    }

    function factorial(n) {
      if (n < 0) return NaN;
      if (n === 0 || n === 1) return 1;
      if (n > 170) return Infinity;
      if (!Number.isInteger(n)) {
        // Gamma approximation for non-integers via Stirling
        return gamma(n + 1);
      }
      let r = 1;
      for (let i = 2; i <= n; i++) r *= i;
      return r;
    }

    function gamma(z) {
      if (z < 0.5) return Math.PI / (Math.sin(Math.PI * z) * gamma(1 - z));
      z -= 1;
      const g = 7;
      const c = [
        0.99999999999980993, 676.5203681218851, -1259.1392167224028,
        771.32342877765313, -176.61502916214059, 12.507343278686905,
        -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7
      ];
      let x = c[0];
      for (let i = 1; i < g + 2; i++) x += c[i] / (z + i);
      const t = z + g + 0.5;
      return Math.sqrt(2 * Math.PI) * Math.pow(t, z + 0.5) * Math.exp(-t) * x;
    }

    function formatNumber(num) {
      if (num === 'Error') return 'Error';
      const str = num.toString();
      if (str.includes('.')) {
        const [intPart, decPart] = str.split('.');
        const formatted = Number(intPart).toLocaleString('en-US');
        return formatted + '.' + decPart;
      }
      return Number(num).toLocaleString('en-US', { maximumFractionDigits: 12 });
    }

    function updateDisplay() {
      resultEl.textContent = formatNumber(currentInput);
      resultEl.classList.toggle('shrink', resultEl.textContent.length > 12);
    }

    function triggerPop() {
      resultEl.classList.remove('pop');
      void resultEl.offsetWidth;
      resultEl.classList.add('pop');
    }

    function calculate(a, op, b) {
      const numA = parseFloat(a);
      const numB = parseFloat(b);
      switch (op) {
        case '+': return numA + numB;
        case '-': return numA - numB;
        case '*': return numA * numB;
        case '/': return numB === 0 ? 'Error' : numA / numB;
        case '**': return Math.pow(numA, numB);
        default: return numB;
      }
    }

    function handleNumber(value) {
      if (currentInput === 'Error') currentInput = '0';
      if (shouldResetInput) {
        currentInput = value;
        shouldResetInput = false;
      } else {
        if (currentInput === '0' && value !== '0') {
          currentInput = value;
        } else if (currentInput === '0' && value === '0') {
          // do nothing
        } else {
          if (currentInput.replace(/[^0-9]/g, '').length >= 15) return;
          currentInput += value;
        }
      }
      updateDisplay();
    }

    function handleDecimal() {
      if (shouldResetInput) {
        currentInput = '0.';
        shouldResetInput = false;
      } else if (!currentInput.includes('.')) {
        currentInput += '.';
      }
      updateDisplay();
    }

    function handleOperator(op) {
      if (currentInput === 'Error') return;
      if (operator && !shouldResetInput) {
        const result = calculate(previousInput, operator, currentInput);
        if (result === 'Error') {
          currentInput = 'Error';
          previousInput = '';
          operator = null;
          expressionEl.textContent = '';
          updateDisplay();
          return;
        }
        currentInput = result.toString();
        updateDisplay();
        triggerPop();
      }
      previousInput = currentInput;
      operator = op;
      shouldResetInput = true;
      expressionEl.textContent = formatNumber(previousInput) + ' ' + operatorSymbols[op];
    }

    function handleEquals() {
      if (!operator || currentInput === 'Error') return;
      expressionEl.textContent = formatNumber(previousInput) + ' ' + operatorSymbols[operator] + ' ' + formatNumber(currentInput) + ' =';
      const result = calculate(previousInput, operator, currentInput);
      if (result === 'Error') {
        currentInput = 'Error';
      } else {
        // Round to avoid floating point issues
        currentInput = parseFloat(result.toPrecision(12)).toString();
      }
      previousInput = '';
      operator = null;
      shouldResetInput = true;
      updateDisplay();
      triggerPop();
    }

    function handleClear() {
      currentInput = '0';
      previousInput = '';
      operator = null;
      shouldResetInput = false;
      expressionEl.textContent = '';
      updateDisplay();
    }

    function handleToggleSign() {
      if (currentInput === '0' || currentInput === 'Error') return;
      if (currentInput.startsWith('-')) {
        currentInput = currentInput.slice(1);
      } else {
        currentInput = '-' + currentInput;
      }
      updateDisplay();
    }

    function handlePercent() {
      if (currentInput === 'Error') return;
      currentInput = (parseFloat(currentInput) / 100).toString();
      updateDisplay();
      triggerPop();
    }

    function handleScientific(func) {
      if (currentInput === 'Error' && func !== 'pi' && func !== 'e' && func !== 'rand') return;
      const val = parseFloat(currentInput);
      let result;

      switch (func) {
        case 'sin':
          result = Math.sin(toRad(val));
          break;
        case 'cos':
          result = Math.cos(toRad(val));
          break;
        case 'tan':
          result = Math.tan(toRad(val));
          break;
        case 'asin':
          result = fromRad(Math.asin(val));
          break;
        case 'acos':
          result = fromRad(Math.acos(val));
          break;
        case 'atan':
          result = fromRad(Math.atan(val));
          break;
        case 'log':
          result = Math.log10(val);
          break;
        case 'ln':
          result = Math.log(val);
          break;
        case 'log2':
          result = Math.log2(val);
          break;
        case 'exp':
          result = Math.exp(val);
          break;
        case 'sqrt':
          result = Math.sqrt(val);
          break;
        case 'cbrt':
          result = Math.cbrt(val);
          break;
        case 'square':
          result = val * val;
          break;
        case 'cube':
          result = val * val * val;
          break;
        case 'power':
          previousInput = currentInput;
          operator = '**';
          shouldResetInput = true;
          expressionEl.textContent = formatNumber(previousInput) + ' xʸ';
          return;
        case 'factorial':
          result = factorial(val);
          break;
        case 'inv':
          result = 1 / val;
          break;
        case 'abs':
          result = Math.abs(val);
          break;
        case 'pi':
          currentInput = Math.PI.toString();
          shouldResetInput = true;
          updateDisplay();
          triggerPop();
          return;
        case 'e':
          currentInput = Math.E.toString();
          shouldResetInput = true;
          updateDisplay();
          triggerPop();
          return;
        case 'rand':
          currentInput = Math.random().toFixed(10).replace(/0+$/, '').replace(/\.$/, '');
          shouldResetInput = true;
          updateDisplay();
          triggerPop();
          return;
        case '10x':
          result = Math.pow(10, val);
          break;
        case '2x':
          result = Math.pow(2, val);
          break;
        case 'paren_open':
          expressionStack.push(val);
          pendingOpenParens++;
          expressionEl.textContent = formatNumber(currentInput) + ' (';
          return;
        case 'paren_close':
          if (pendingOpenParens > 0) {
            pendingOpenParens--;
            expressionEl.textContent = formatNumber(currentInput) + ')';
          }
          return;
        case 'ms':
          memory = val;
          expressionEl.textContent = 'M=' + formatNumber(memory.toString());
          triggerPop();
          return;
        case 'mr':
          currentInput = memory.toString();
          shouldResetInput = true;
          updateDisplay();
          triggerPop();
          return;
        case 'mc':
          memory = 0;
          expressionEl.textContent = 'M cleared';
          return;
        case 'm+':
          memory += val;
          expressionEl.textContent = 'M=' + formatNumber(memory.toString());
          triggerPop();
          return;
        default:
          return;
      }

      if (isNaN(result) || (!isFinite(result) && result !== Infinity)) {
        currentInput = 'Error';
      } else {
        currentInput = parseFloat(result.toPrecision(12)).toString();
      }
      shouldResetInput = true;
      updateDisplay();
      triggerPop();
    }

    // Ripple effect
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('pointerdown', (e) => {
        const rect = btn.getBoundingClientRect();
        btn.style.setProperty('--x', ((e.clientX - rect.left) / rect.width * 100) + '%');
        btn.style.setProperty('--y', ((e.clientY - rect.top) / rect.height * 100) + '%');
      });
    });

    // Button click handlers
    document.querySelector('.buttons').addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const action = btn.dataset.action;
      const value = btn.dataset.value;

      switch (action) {
        case 'number': handleNumber(value); break;
        case 'decimal': handleDecimal(); break;
        case 'operator': handleOperator(value); break;
        case 'equals': handleEquals(); break;
        case 'clear': handleClear(); break;
        case 'toggle-sign': handleToggleSign(); break;
        case 'percent': handlePercent(); break;
        case 'sci': handleScientific(value); break;
      }
    });

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') handleNumber(e.key);
      else if (e.key === '.') handleDecimal();
      else if (e.key === '+') handleOperator('+');
      else if (e.key === '-') handleOperator('-');
      else if (e.key === '*') handleOperator('*');
      else if (e.key === '/') { e.preventDefault(); handleOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') handleEquals();
      else if (e.key === 'Escape' || e.key === 'Delete') handleClear();
      else if (e.key === 'Backspace') {
        if (currentInput.length > 1 && !shouldResetInput) {
          currentInput = currentInput.slice(0, -1);
        } else {
          currentInput = '0';
        }
        updateDisplay();
      }
      else if (e.key === '%') handlePercent();
      else if (e.key === 's' || e.key === 'S') handleScientific('sin');
      else if (e.key === 'c' || e.key === 'C') handleScientific('cos');
      else if (e.key === 't' || e.key === 'T') handleScientific('tan');
      else if (e.key === 'l' || e.key === 'L') handleScientific('log');
      else if (e.key === 'n' || e.key === 'N') handleScientific('ln');
      else if (e.key === 'r' || e.key === 'R') handleScientific('sqrt');
      else if (e.key === 'p' || e.key === 'P') handleScientific('pi');
      else if (e.key === '^') { handleOperator('**'); }
      else if (e.key === '!') handleScientific('factorial');
    });
  </script>
</body>
</html>
